<svg width="650" height="180" viewBox="0 0 650 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b6e35f"></stop>
      <stop offset="100%" stop-color="#6bd34f"></stop>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c6ff"></stop>
      <stop offset="100%" stop-color="#0072ff"></stop>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect x="20" y="80" width="14" height="60" fill="url(#greenGrad)" rx="3"></rect>
  <rect x="45" y="60" width="14" height="80" fill="url(#greenGrad)" rx="3"></rect>
  <rect x="70" y="40" width="14" height="100" fill="url(#greenGrad)" rx="3"></rect>
  <rect x="95" y="20" width="14" height="120" fill="url(#greenGrad)" rx="3"></rect>

  <polyline points="20,100 50,75 75,95 105,55" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></polyline>

  <polygon points="105,55 120,48 110,70" fill="white"></polygon>

  <path d="M20 150 A70 70 0 0 1 120 150" fill="none" stroke="url(#blueGrad)" stroke-width="10"></path>

  <!-- Bigger Text -->
  <text x="150" y="115" font-family="Arial, sans-serif" font-size="60" fill="white" font-weight="bold">
    Market
  </text>

  <text x="360" y="115" font-family="Arial, sans-serif" font-size="60" fill="url(#greenGrad)" font-weight="bold">
    Pulse
  </text>
</svg>